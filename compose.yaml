services:
  endless-loader:
    build:
      context: .
    image: endless-loader:local
    ports:
      - "8080:8080"
    environment:
      ENDLESS_LOADER_CONFIG: /config/config.toml
    volumes:
      - ./compose.config.toml:/config/config.toml:ro
      - ./samples/library:/data/library:ro
      - ./data/pedal_mount:/mnt/endless
      - ./data/runtime:/data/runtime

