library_root = "./samples/library"
pedal_mount_path = "./data/pedal_mount"
state_path = "./data/runtime/state.json"

[web]
host = "127.0.0.1"
port = 8755

[lcd]
enabled = false
bus = 1
address = "0x27"

[buttons]
enabled = false
next_pin = 17
prev_pin = 27
load_pin = 22

[companion]
fxpatchsdk_path = ""
manifest_relpath = "metadata/endless_loader_companion.json"
github_repo = "edonahue/FxPatchSDK"
github_branch = "master"
fetch_enabled = false
timeout_seconds = 5
cache_path = "./data/companion_cache.json"

[usb]
mode = "host"
expected_label = "ENDLESS"
expected_uuid = ""
auto_eject_after_write = false
verify_hash = true
discovery_timeout_seconds = 5
helper_endpoint = "http://127.0.0.1:8755"
log_path = "./data/runtime/usb_helper_operations.jsonl"
